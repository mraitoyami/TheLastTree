<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eco Survival 3D</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="hud">
      <h1>Eco Survival 3D</h1>
      <p>Move: WASD | Look: Mouse drag | Action: E</p>
      <div class="stats-grid">
        <div>Health: <span id="health">100</span></div>
        <div>Stamina: <span id="stamina">100</span></div>
        <div>Food: <span id="food">0</span></div>
        <div>Weapon Lv: <span id="weaponLevel">1</span></div>
        <div>Fire Rate: <span id="fireRate">1.00</span></div>
        <div>Oxygen: <span id="oxygen">50</span></div>
        <div>Pollution: <span id="pollution">50</span></div>
        <div>Forest: <span id="forestDensity">50</span></div>
        <div>Eco Points: <span id="ecoPoints">0</span></div>
        <div>Day: <span id="day">1</span></div>
      </div>
      <p id="hint">Walk close to trees, bins, or animals and press E.</p>
      <p id="message"></p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module" src="./game.js"></script>
  </body>
</html>
